name: Build and Publish Wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_zig_library:
    name: Build Zig Library (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-linux-gnu
            artifact: zig-lib-linux-x86_64
          - os: ubuntu-latest
            arch: aarch64
            target: aarch64-linux-gnu
            artifact: zig-lib-linux-aarch64
          - os: macos-latest
            arch: arm64
            target: aarch64-macos-none
            artifact: zig-lib-macos-arm64

    steps:
      - uses: actions/checkout@v5

      - name: Setup Zig 0.16.0
        shell: bash
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)    ZIG_DIR="zig-x86_64-linux-0.16.0" ;;
            macOS-ARM64)  ZIG_DIR="zig-aarch64-macos-0.16.0" ;;
            macOS-X64)    ZIG_DIR="zig-x86_64-macos-0.16.0" ;;
            *) echo "Unsupported runner: ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          curl -fsSL "https://ziglang.org/download/0.16.0/${ZIG_DIR}.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "${PWD}/${ZIG_DIR}" >> "$GITHUB_PATH"

      - name: Build Zig library
        run: |
          zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Upload Zig library artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            zig-out/lib/libdhi.*
            zig-out/lib/dhi.*
          retention-days: 1

  build_wheels:
    name: Wheels (${{ matrix.os }}-${{ matrix.arch }})
    needs: build_zig_library
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            zig-artifact: zig-lib-linux-x86_64
            cibw-archs: x86_64
          - os: ubuntu-latest
            arch: aarch64
            zig-artifact: zig-lib-linux-aarch64
            cibw-archs: aarch64
          - os: macos-latest
            arch: arm64
            zig-artifact: zig-lib-macos-arm64
            cibw-archs: arm64

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Download Zig library
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.zig-artifact }}
          path: zig-out/lib

      - name: Verify Zig library
        run: |
          echo "Zig library for ${{ matrix.arch }}:"
          ls -la zig-out/lib/
          file zig-out/lib/libdhi.* || true

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-* cp313t-* cp314-* cp314t-*
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686 *-win32"
          CIBW_ARCHS: ${{ matrix.cibw-archs }}
          # Build free-threaded wheels. cibuildwheel 3.x enables CPython 3.14
          # free-threading (cp314t) by default, but 3.13 free-threading (cp313t)
          # is still experimental and must be opted into here — without this,
          # cp313t wheels are silently dropped (v1.3.3 shipped them on PyPI).
          # Note: cibuildwheel 3.4.1 warns that the `cpython-freethreading` enable
          # value is itself being phased out as free-threading goes default — but
          # in this pinned version it is STILL required to emit cp313t. Drop it only
          # once cibuildwheel selects cp313t by default. (The old 2.x flag was
          # CIBW_FREE_THREADED_SUPPORT, which is correctly absent.)
          CIBW_ENABLE: cpython-freethreading
          CIBW_BEFORE_BUILD: |
            pip install "setuptools>=77.0.0" wheel "packaging>=24.2"
          # Test gate: install each built wheel and run the test suite against it,
          # per Python version, BEFORE anything is published — this is what stops a
          # broken wheel from ever reaching PyPI.
          # CRITICAL: use CIBW_TEST_SOURCES so cibuildwheel COPIES tests/ into an
          # isolated test dir and runs from there. Pointing pytest at {package}/tests
          # inside the project tree instead puts the repo on sys.path, so `import dhi`
          # resolves to the uncompiled SOURCE package (no _dhi_native.so) and shadows
          # the installed wheel — _dhi_native is None and every native test crashes.
          # Copying tests out means the only importable `dhi` is the wheel under test.
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_SOURCES: tests
          CIBW_TEST_COMMAND: python -m pytest tests -q
          # Skip the test run only on emulated aarch64 wheels (pytest under QEMU is
          # extremely slow); the wheels are still built and shipped.
          CIBW_TEST_SKIP: "*-manylinux_aarch64 *-musllinux_aarch64"
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=13.0
        with:
          package-dir: ./python-bindings
          output-dir: wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build sdist
        run: |
          cd python-bindings
          pip install build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python-bindings/dist/*.tar.gz
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Flatten dist directory
        run: |
          mkdir -p dist
          find dist-all -name "*.whl" -exec cp {} dist/ \;
          find dist-all -name "*.tar.gz" -exec cp {} dist/ \;
          echo "Wheels to publish:"
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
