name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zig-build-and-test:
    name: Zig Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig 0.16.0
        shell: bash
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)    ZIG_DIR="zig-x86_64-linux-0.16.0" ;;
            Linux-ARM64)  ZIG_DIR="zig-aarch64-linux-0.16.0" ;;
            macOS-ARM64)  ZIG_DIR="zig-aarch64-macos-0.16.0" ;;
            macOS-X64)    ZIG_DIR="zig-x86_64-macos-0.16.0" ;;
            *) echo "Unsupported runner: ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          curl -fsSL "https://ziglang.org/download/0.16.0/${ZIG_DIR}.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "${PWD}/${ZIG_DIR}" >> "$GITHUB_PATH"

      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Run tests
        run: zig build test

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig 0.16.0
        shell: bash
        run: |
          curl -fsSL https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "${PWD}/zig-x86_64-linux-0.16.0" >> "$GITHUB_PATH"

      - name: Build Zig library
        run: zig build -Doptimize=ReleaseFast

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd python-bindings
          pip install -e .
          pip install pytest

      - name: Run tests
        run: |
          cd python-bindings
          pytest tests/ -v

  js-test:
    name: JS Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: js-bindings
        run: bun install

      - name: Run Zod 4 compatibility tests
        working-directory: js-bindings
        run: bun run tests/test-zod4-compat.ts

      - name: Run feature tests
        working-directory: js-bindings
        run: bun run tests/test-all-features.ts
